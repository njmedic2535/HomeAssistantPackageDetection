blueprint:
  name: AI Package Detector (Selectable Piper TTS)
  description: >
    📦 AI Package Detector with a selectable Piper TTS entity.
  domain: automation
  input:
    camera_entities:
      name: Cameras
      selector:
        entity:
          multiple: true
          domain: camera
    ai_agent:
      name: AI Task Agent
      selector:
        entity:
          domain: ai_task
    motion_sensor_entities:
      name: Optional Motion Sensors
      default: []
      selector:
        entity:
          multiple: true
          domain: binary_sensor
    image_prompt_user_details:
      name: Image Analysis Details
      default: "Focus on the area around the door and doormat."
      selector:
        text:
          multiline: true
    time_pattern_minutes:
      name: Check Interval (Minutes)
      default: "/15"
      selector:
        text:
    notification_target:
      name: Notification Target
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true
    # --- SELECTABLE PIPER INPUTS ---
    tts_engine:
      name: Piper TTS Entity
      description: Select your Piper TTS entity (e.g., tts.piper).
      selector:
        entity:
          domain: tts
    tts_media_player:
      name: TTS Media Player
      description: Select the speaker for the announcement.
      selector:
        entity:
          domain: media_player
    tts_message:
      name: TTS Custom Message
      default: "A new package has been detected at the front door."
      selector:
        text:
    # -------------------------------
    previous_package_count_helper:
      name: Package Count Helper
      selector:
        entity:
          domain: input_number
    package_status_helper:
      name: Package Status Helper
      selector:
        entity:
          domain: input_boolean

variables:
  camera_entities: !input camera_entities
  image_prompt_user_details: !input image_prompt_user_details
  previous_package_count_helper: !input previous_package_count_helper
  package_status_helper: !input package_status_helper
  tts_engine: !input tts_engine
  tts_media_player: !input tts_media_player
  tts_message: !input tts_message

trigger:
  - platform: time_pattern
    minutes: !input time_pattern_minutes
    id: time_trigger
  - platform: state
    entity_id: !input motion_sensor_entities
    to: "on"
    id: motion_trigger

action:
  - if:
      - condition: trigger
        id: motion_trigger
    then:
      - delay: "00:00:02"

  - action: ai_task.generate_data
    data:
      entity_id: !input ai_agent
      task_name: "package_check"
      instructions: >
        Analyze the attached camera feeds. Count the number of delivery packages visible.
        Previous count: {{ states(previous_package_count_helper)|int(0) }}
        User Notes: {{ image_prompt_user_details }}
      attachments: >
        {% set ns = namespace(items=[]) %}
        {% for camera in camera_entities %}
          {% set ns.items = ns.items + [{'media_content_id': 'media-source://camera/' ~ camera, 'media_content_type': 'image/jpeg'}] %}
        {% endfor %}
        {{ ns.items }}
      structure:
        count:
          selector:
            number:
              min: 0
              max: 10
        message:
          selector:
            text:
    response_variable: ai_response

  - variables:
      count: "{{ ai_response.data.count | int(default=-1) }}"
      desc: "{{ ai_response.data.message }}"

  - choose:
      # NEW PACKAGE DETECTED
      - conditions:
          - condition: template
            value_template: "{{ count > (states(previous_package_count_helper) | int(0)) }}"
        sequence:
          # --- PIPER TTS CALL ---
          - action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ tts_media_player }}"
              message: "{{ tts_message }}"
          # ----------------------
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 New Package"
                    message: "{{ desc }}"
      
      # PACKAGE REMOVED
      - conditions:
          - condition: template
            value_template: "{{ count < (states(previous_package_count_helper) | int(0)) and count >= 0 }}"
        sequence:
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 Package Removed"
                    message: "The porch is now clear."

  - if:
      - condition: template
        value_template: "{{ count != -1 }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ previous_package_count_helper }}"
        data:
          value: "{{ count }}"
      - action: "input_boolean.turn_{{ 'on' if count > 0 else 'off' }}"
        target:
          entity_id: "{{ package_status_helper }}"

mode: single
