blueprint:
  name: AI Package Detector
  description: >
    📦🔍 AI Package Detector: I'm not a programmer. I'm just a middle-aged Nurse Anesthesiolgist who really wants to cancel his Nest Aware subscription.
    Google bricked my 18-month old Pixel phone with a bad update and wouldn't do anything about it, so I'm on a mission to stop sending money to Alphabet.
    I shamlessly used Gemini to figure out some of this code. Well, most of this code. Enjoy!
    Credit to Dave Kneeland (https://gist.github.com/dkneeland/d1fe376871a5d40d93e3ae382622b369) for the original, which I've probably made a mess from.
  domain: automation
  input:
    camera_entities:
      name: Cameras
      description: |-
        Select the cameras monitoring your delivery area.
      selector:
        entity:
          multiple: true
          domain: camera
    motion_sensor_entities:
      name: Motion Sensors
      description: |-
        Selecet the person or motion sensor linked to the cameras.
      selector:
        entity:
          multiple: true
          domain: binary_sensor
    ai_agent:
      name: AI Task Agent
      description: |-
        Select your AI Agent to process the task.
      selector:
        entity:
          domain: ai_task         
    image_prompt_user_details:
      name: Image Analysis Details
      description: |-
        Provide details for the analysis (e.g. "Focus on the blue door and welcome mat.").
      default: []
      selector:
        text:
          multiline: true
    check_times:
      name: Specific Times to Check
      description: Select the specific times of day you want to trigger the check. 24-hour time format.
      default: []
      selector:
        time:
          multiple: true
    time_pattern_minutes:
      name: Check Interval (Minutes)
      description: |-
        Only use the Time Interval if you do not have a limit on calls to your AI Agent!
      default: nul
      selector:
        text:
    notification_target:
      name: Notification Target
      description: |-
        Specify one or more targets (devices) for notifications.
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true
    tts_engine:
      name: TTS Entity
      description: Select your TTS entity (e.g., tts.piper).
      selector:
        entity:
          domain: tts
    tts_media_player:
      name: TTS Media Player
      description: Select the speaker for the announcement.
      selector:
        entity:
          domain: media_player
    tts_message:
      name: TTS Custom Message
      default: "A new package has been detected at the front door."
      selector:
        text:
    previous_package_count_helper:
      name: Package Count Helper
      description: |-
        Select an input_number entity to store the last package count.
        Create via Helpers: https://my.home-assistant.io/redirect/helpers/
      default: input_number.previous_package_count
      selector:
        entity:
          domain: input_number
    package_status_helper:
      name: Package Status Helper
      description: |-
        Select an input_boolean entity to track whether packages are waiting to be picked up.
        Will be ON when packages are present, OFF when no packages are present.
        Create via Helpers: https://my.home-assistant.io/redirect/helpers/
      default: input_boolean.packages_waiting
      selector:
        entity:
          domain: input_boolean

variables:
  camera_entities: !input camera_entities
  image_prompt_user_details: !input image_prompt_user_details
  previous_package_count_helper: !input previous_package_count_helper
  package_status_helper: !input package_status_helper
  tts_engine: !input tts_engine
  tts_media_player: !input tts_media_player
  tts_message: !input tts_message

trigger:
  - platform: time_pattern
    minutes: !input time_pattern_minutes
    id: time_trigger
  - platform: time
    at: !input check_times
    id: time_trigger
  - platform: state
    entity_id: !input motion_sensor_entities
    to: "on"
    id: motion_trigger
    
action:
  - if:
      - condition: trigger
        id: motion_trigger
    then:
      - delay: "00:00:30"

  - action: ai_task.generate_data
    data:
      entity_id: !input ai_agent
      task_name: "package_check"
      instructions: >
        Analyze the attached camera feeds. Count the number of delivery packages visible with high certainty. 
        Only report a package if you're absolutely certain it's a delivery package (boxes, envelopes, etc).
        Include a brief decription of the packages if able. 
        Count must include actual packages visible now, not previous state.
        If a person is holding a package, wait one minute and analyze the feed again.
        If you see no packages, count must be 0 regardless of previous count.
        Previous count: {{ states(previous_package_count_helper)|int(0) }}
        User Notes: {{ image_prompt_user_details }}
      attachments: >
        {% set ns = namespace(items=[]) %}
        {% for camera in camera_entities %}
          {% set ns.items = ns.items + [{'media_content_id': 'media-source://camera/' ~ camera, 'media_content_type': 'image/jpeg'}] %}
        {% endfor %}
        {{ ns.items }}
      structure:
        count:
          selector:
            number:
              min: 0
              max: 10
        message:
          selector:
            text:
    response_variable: ai_response

  - variables:
      count: "{{ ai_response.data.count | int(default=-1) }}"
      desc: "{{ ai_response.data.message }}"

  - choose:
      # NEW PACKAGE DETECTED
      - conditions:
          - condition: template
            value_template: "{{ count > (states(previous_package_count_helper) | int(0)) }}"
        sequence:
          # --- PIPER TTS CALL ---
          - action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ tts_media_player }}"
              message: "{{ tts_message }}"
          # ----------------------
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 New Package"
                    message: "{{ desc }}"
      
      # PACKAGE REMOVED
      - conditions:
          - condition: template
            value_template: "{{ count < (states(previous_package_count_helper) | int(0)) and count >= 0 }}"
        sequence:
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 Package Removed"
                    message: "The porch is now clear."

  - if:
      - condition: template
        value_template: "{{ count != -1 }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ previous_package_count_helper }}"
        data:
          value: "{{ count }}"
      - action: "input_boolean.turn_{{ 'on' if count > 0 else 'off' }}"
        target:
          entity_id: "{{ package_status_helper }}"

mode: single
