blueprint:
  name: AI Package Detector (Time Fix)
  description: >
    📦 AI Package Detector. Fixed the "undefined variable" error by properly
    mapping the user details input to a variable.
  domain: automation
  input:
    camera_entities:
      name: Cameras
      description: |-
        Select the cameras monitoring your delivery area.
      selector:
        entity:
          multiple: true
          domain: camera
    ai_agent:
      name: AI Task Agent
      selector:
        entity:
          domain: ai_task
    motion_sensor_entities:
      name: Motion Sensors
      description: |-
        Select motion sensors linked to the cameras. This triggers detection on motion.
      default: []
      selector:
        entity:
          multiple: true
          domain: binary_sensor
    image_prompt_user_details:
      name: Image Analysis Details
      description: |-
        Provide details for the analysis (e.g. "Focus on the blue door and welcome mat.").
      default: []
      selector:
        text:
          multiline: true
#    time_pattern_minutes:
#      name: Check Interval (Minutes)
#      default: "nul"
#      selector:
#        text:
    notification_target:
      name: Notification Target
      description: >
        Specify one or more targets for notifications.
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true
    previous_package_count_helper:
      name: Package Count Helper
      description: |-
        Select an input_number entity to store the last package count.
        Create via Helpers: https://my.home-assistant.io/redirect/helpers/
      default: input_number.previous_package_count
      selector:
        entity:
          domain: input_number
#    previous_package_description_helper:
#      name: Package Description Helper (Internal)
#      description: |-
#        Select an input_text entity to store LLM context. Must be created with **max=255 characters** to avoid truncation.
#        Create via Helpers: https://my.home-assistant.io/redirect/helpers/
#      default: input_text.previous_package_description
#      selector:
#        entity:
#          domain: input_text          
    package_status_helper:
      name: Package Status Helper
      description: |-
        Select an input_boolean entity to track whether packages are waiting to be picked up.
        Will be ON when packages are present, OFF when no packages are present.
        Create via Helpers: https://my.home-assistant.io/redirect/helpers/
      default: input_boolean.packages_waiting
      selector:
        entity:
          domain: input_boolean

variables:
  # THESE WERE MISSING - Mapping inputs to variables so the templates can see them
  camera_entities: !input camera_entities
  image_prompt_user_details: !input image_prompt_user_details
  previous_package_count_helper: !input previous_package_count_helper
#  previous_package_description_helper: !input previous_package_description_helper
  package_status_helper: !input package_status_helper

trigger:
#  - platform: time_pattern
#    minutes: !input time_pattern_minutes
#    id: time_trigger
  - platform: state
    entity_id: !input motion_sensor_entities
    to: "on"
    id: motion_trigger

action:
  - if:
      - condition: trigger
        id: motion_trigger
    then:
      - delay: "00:00:05"

  - action: ai_task.generate_data
    data:
      entity_id: !input ai_agent
      task_name: "package_check"
      instructions: >
        Analyze the attached camera feeds. Count the number of delivery packages visible with high certainty. Count MUST REFLECT ACTUAL packages visible now, not previous state. If you see no packages, count MUST be 0 regardless of previous count.
        Previous count: {{ states(previous_package_count_helper)|int(0) }}
        User Notes: {{ image_prompt_user_details }}
      attachments: >
        {% set ns = namespace(items=[]) %}
        {% for camera in camera_entities %}
          {% set ns.items = ns.items + [{'media_content_id': 'media-source://camera/' ~ camera, 'media_content_type': 'image/jpeg'}] %}
        {% endfor %}
        {{ ns.items }}
      structure:
        count:
          selector:
            number:
              min: 0
              max: 10
        message:
          selector:
            text:
    response_variable: ai_response

  - variables:
      # Use .data to access the structured response from ai_task.generate_data
      count: "{{ ai_response.data.count | int(default=-1) }}"
      desc: "{{ ai_response.data.message }}"

  - choose:
      # NEW PACKAGE
      - conditions:
          - condition: template
            value_template: "{{ count > (states(previous_package_count_helper) | int(0)) }}"
        sequence:
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 New Package"
                    message: "{{ desc }}"
      
      # PACKAGE REMOVED
      - conditions:
          - condition: template
            value_template: "{{ count < (states(previous_package_count_helper) | int(0)) and count >= 0 }}"
        sequence:
          - repeat:
              for_each: !input notification_target
              sequence:
                - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                  data:
                    title: "📦 Package Removed"
                    message: "The porch is now clear."

  - if:
      - condition: template
        value_template: "{{ count != -1 }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ previous_package_count_helper }}"
        data:
          value: "{{ count }}"
      - action: "input_boolean.turn_{{ 'on' if count > 0 else 'off' }}"
        target:
          entity_id: "{{ package_status_helper }}"

mode: single
